name: publish

on:
  push:
    tags:
      - 'jetbrains-v*'
  workflow_dispatch:
    inputs:
      plugin_version:
        description: 'Plugin version to publish, for example 1.0.0'
        required: true
      channel:
        description: 'JetBrains Marketplace channel'
        default: 'default'
        required: true

jobs:
  publish:
    name: Sign and publish JetBrains plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INTELLIJ_PUBLISH_TOKEN: ${{ secrets.INTELLIJ_PUBLISH_TOKEN }}
      JETBRAINS_CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
      JETBRAINS_PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
      JETBRAINS_PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
      JETBRAINS_MARKETPLACE_CHANNEL: ${{ github.event.inputs.channel || 'default' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Resolve plugin version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#jetbrains-v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.plugin_version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate publish secrets
        shell: bash
        run: |
          test -n "$INTELLIJ_PUBLISH_TOKEN"
          test -n "$JETBRAINS_CERTIFICATE_CHAIN"
          test -n "$JETBRAINS_PRIVATE_KEY"
          test -n "$JETBRAINS_PRIVATE_KEY_PASSWORD"
      - name: Build and test
        run: >
          gradle check buildPlugin
          -PpluginVersion=${{ steps.version.outputs.value }}
          --no-daemon
          --stacktrace
      - name: Verify IntelliJ IDEA Community
        run: gradle verifyPlugin -PkorasafeVerifyIde=idea-community -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Verify IntelliJ IDEA Ultimate
        run: gradle verifyPlugin -PkorasafeVerifyIde=idea-ultimate -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Verify PyCharm Community
        run: gradle verifyPlugin -PkorasafeVerifyIde=pycharm-community -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Verify PyCharm Professional
        run: gradle verifyPlugin -PkorasafeVerifyIde=pycharm-professional -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Verify WebStorm
        run: gradle verifyPlugin -PkorasafeVerifyIde=webstorm -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Verify GoLand
        run: gradle verifyPlugin -PkorasafeVerifyIde=goland -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Verify RubyMine
        run: gradle verifyPlugin -PkorasafeVerifyIde=rubymine -PpluginVersion=${{ steps.version.outputs.value }} --no-daemon --stacktrace
      - name: Sign and publish
        run: >
          gradle signPlugin publishPlugin
          -PpluginVersion=${{ steps.version.outputs.value }}
          --no-daemon
          --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jetbrains-plugin-publish-${{ steps.version.outputs.value }}
          path: |
            plugin/build/distributions/*.zip
            plugin/build/reports/**
            plugin/build/verificationReports/**
          if-no-files-found: ignore
