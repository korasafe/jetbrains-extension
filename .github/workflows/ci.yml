name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Gradle build and test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - run: gradle build test --no-daemon --stacktrace
