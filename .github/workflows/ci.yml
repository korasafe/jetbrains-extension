name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Gradle build and test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check dependencyCheckAnalyze buildPlugin --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jetbrains-plugin-jdk-${{ matrix.java }}
          path: |
            plugin/build/distributions/*.zip
            plugin/build/reports/**
            plugin/build/verificationReports/**
            **/build/reports/dependency-check-report.*
          if-no-files-found: ignore

  verify-plugin:
    name: Plugin Verifier (${{ matrix.ide }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ide:
          - idea-community
          - idea-ultimate
          - pycharm-community
          - pycharm-professional
          - webstorm
          - goland
          - rubymine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/wrapper-validation@v4
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew buildPlugin verifyPlugin -PkorasafeVerifyIde=${{ matrix.ide }} --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jetbrains-verifier-${{ matrix.ide }}
          path: |
            plugin/build/distributions/*.zip
            plugin/build/reports/**
            plugin/build/verificationReports/**
          if-no-files-found: ignore
