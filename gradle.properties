# Gradle daemon JVM settings.
#
# The OWASP dependency-check plugin loads the NVD CVE database (250k+
# records) into an H2 embedded database in-process. Default 512 MiB heap
# OOMs on CVE-2024-8464 (observed 2026-05-26). Bumping to 4 GB heap +
# 1 GB metaspace gives the dependencyCheckAnalyze task headroom; non-
# audit tasks (check, buildPlugin, verifyPlugin) are unaffected by the
# higher cap.
#
# UseG1GC keeps the long-running daemon stable under the heavier alloc
# pressure from the NVD update.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -Dfile.encoding=UTF-8

# Avoid the JIT-warmup noise + daemon thrash logging that fills CI output.
org.gradle.daemon.performance.disable-logging=true
